<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenCode 请求统计</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 20px; max-width: 1200px; }
h1 { font-size: 1.35rem; }
a { color: #2e7d32; }
.filters { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px 16px; margin: 16px 0; padding: 16px; background: #f5f5f5; border-radius: 6px; }
.filters label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
.filters input { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; }
.range-row { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
.range-row > div { flex: 1; min-width: 180px; }
.actions { margin-top: 8px; }
button.query { padding: 8px 20px; background: #4CAF50; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
button.query:hover { background: #43a047; }
.err { color: #c62828; margin: 10px 0; }
table { border-collapse: collapse; width: 100%; margin-top: 16px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
th { background-color: #4CAF50; color: white; }
tr:nth-child(even) { background-color: #f2f2f2; }
.summary { margin-top: 12px; padding: 12px 14px; background: #e8f5e9; border-radius: 6px; font-size: 1.1rem; font-weight: bold; color: #1b5e20; }
.muted { color: #666; font-size: 13px; margin: 8px 0; }
section.stats-block { margin-top: 24px; }
section.stats-block h2 { font-size: 1rem; margin: 0 0 8px 0; color: #333; }
.tables-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 800px) { .tables-row { grid-template-columns: 1fr; } }
section.stats-block table { margin-top: 0; }
</style>
</head>
<body>
<p><a href="/index.html">← Push Records</a></p>
<h1>OpenCode 请求统计</h1>
<p class="muted">过滤条件（可选）作用于下方全部统计；时间按 create_time。结果：总次数，以及分别按 git_username、model_id 汇总。</p>

<form id="f" class="filters" onsubmit="return runQuery(event)">
  <div>
    <label for="gitUsername">git_username</label>
    <input id="gitUsername" name="gitUsername" type="text" placeholder="精确匹配，可空">
  </div>
  <div>
    <label for="modelId">model_id</label>
    <input id="modelId" name="modelId" type="text" placeholder="精确匹配，可空">
  </div>
  <div>
    <label for="agent">agent</label>
    <input id="agent" name="agent" type="text" placeholder="精确匹配，可空">
  </div>
  <div>
    <label for="opencodeVersion">opencode_version</label>
    <input id="opencodeVersion" name="opencodeVersion" type="text" placeholder="精确匹配，可空">
  </div>
  <div class="range-row">
    <div>
      <label for="startTime">开始时间</label>
      <input id="startTime" name="startTime" type="datetime-local" required>
    </div>
    <div>
      <label for="endTime">结束时间</label>
      <input id="endTime" name="endTime" type="datetime-local" required>
    </div>
    <div class="actions">
      <button type="submit" class="query">查询</button>
    </div>
  </div>
</form>
<div id="err" class="err"></div>
<div id="summary" class="summary" style="display:none;"></div>
<div id="out"></div>

<script>
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function toDatetimeLocal(d) {
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
    + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function defaultRange() {
  const end = new Date();
  const start = new Date(end.getTime() - 7 * 24 * 60 * 60 * 1000);
  document.getElementById('startTime').value = toDatetimeLocal(start);
  document.getElementById('endTime').value = toDatetimeLocal(end);
}
defaultRange();

function esc(s) {
  if (s == null || s === '') return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/** 按次数数值从大到小（避免 JSON 中次数为字符串时顺序错乱） */
function sortByCallCountDesc(rows) {
  return (rows || []).slice().sort(function(a, b) {
    return (Number(b.call_count) || 0) - (Number(a.call_count) || 0);
  });
}

function runQuery(ev) {
  ev.preventDefault();
  const err = document.getElementById('err');
  err.textContent = '';
  const p = new URLSearchParams();
  const gu = document.getElementById('gitUsername').value.trim();
  const mid = document.getElementById('modelId').value.trim();
  const ag = document.getElementById('agent').value.trim();
  const ver = document.getElementById('opencodeVersion').value.trim();
  const st = document.getElementById('startTime').value;
  const et = document.getElementById('endTime').value;
  if (gu) p.set('gitUsername', gu);
  if (mid) p.set('modelId', mid);
  if (ag) p.set('agent', ag);
  if (ver) p.set('opencodeVersion', ver);
  if (st) p.set('startTime', st);
  if (et) p.set('endTime', et);

  fetch('/api/opencode-request-stats/aggregate?' + p.toString())
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      const total = data.totalCount != null ? data.totalCount : 0;
      const sumEl = document.getElementById('summary');
      sumEl.style.display = 'block';
      sumEl.textContent = '总调用次数：' + total;

      const rowsGit = sortByCallCountDesc(data.byGitUsername);
      const rowsModel = sortByCallCountDesc(data.byModelId);

      function tableTwoCol(colTitle, rows, keyName) {
        let h = '<table><thead><tr><th>' + colTitle + '</th><th>次数</th></tr></thead><tbody>';
        if (rows.length === 0) {
          h += '<tr><td colspan="2">无数据</td></tr>';
        } else {
          for (const row of rows) {
            h += '<tr><td>' + esc(row[keyName]) + '</td><td>' + esc(row.call_count) + '</td></tr>';
          }
        }
        h += '</tbody></table>';
        return h;
      }

      document.getElementById('out').innerHTML =
        '<div class="tables-row">'
        + '<section class="stats-block"><h2>按 git_username</h2>'
        + tableTwoCol('git_username', rowsGit, 'git_username')
        + '</section>'
        + '<section class="stats-block"><h2>按 model_id</h2>'
        + tableTwoCol('model_id', rowsModel, 'model_id')
        + '</section>'
        + '</div>';
    })
    .catch(function(e) {
      err.textContent = '查询失败：' + e.message;
      const sumEl = document.getElementById('summary');
      sumEl.textContent = '';
      sumEl.style.display = 'none';
      document.getElementById('out').innerHTML = '';
    });
  return false;
}
</script>
</body>
</html>
